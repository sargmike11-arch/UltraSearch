<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ─── CSS VARIABLES ─── */
        :root {
            --transition-theme: background 0.5s ease, color 0.5s ease, border-color 0.5s ease, box-shadow 0.5s ease;
        }

        [data-theme="dark"] {
            --bg-base:        #07070f;
            --bg-layer:       #0e0e1c;
            --bg-card:        rgba(255,255,255,0.04);
            --bg-card-hover:  rgba(255,255,255,0.08);
            --bg-input:       rgba(255,255,255,0.05);
            --border:         rgba(255,255,255,0.07);
            --border-focus:   rgba(110,80,255,0.7);
            --text-primary:   #f0f0ff;
            --text-secondary: #8888aa;
            --text-muted:     #555577;
            --accent-1:       #6e50ff;
            --accent-2:       #2575fc;
            --accent-3:       #ff4b8b;
            --glow-1:         rgba(110,80,255,0.35);
            --glow-2:         rgba(37,117,252,0.25);
            --star-color:     rgba(255,255,255,0.85);
            --nebula-opacity: 0.12;
            --logo-filter:    none;
            --card-shadow:    0 8px 32px rgba(0,0,0,0.4);
            --scroll-track:   #0e0e1c;
            --scroll-thumb:   #6e50ff;
        }

        [data-theme="light"] {
            --bg-base:        #f4f4fc;
            --bg-layer:       #ffffff;
            --bg-card:        rgba(255,255,255,0.85);
            --bg-card-hover:  rgba(255,255,255,1);
            --bg-input:       rgba(255,255,255,0.9);
            --border:         rgba(0,0,0,0.07);
            --border-focus:   rgba(110,80,255,0.6);
            --text-primary:   #0a0a1a;
            --text-secondary: #555577;
            --text-muted:     #9999bb;
            --accent-1:       #6e50ff;
            --accent-2:       #2575fc;
            --accent-3:       #ff4b8b;
            --glow-1:         rgba(110,80,255,0.2);
            --glow-2:         rgba(37,117,252,0.15);
            --star-color:     rgba(110,80,255,0.5);
            --nebula-opacity: 0.06;
            --logo-filter:    none;
            --card-shadow:    0 4px 24px rgba(0,0,0,0.08);
            --scroll-track:   #f4f4fc;
            --scroll-thumb:   #6e50ff;
        }

        /* ─── RESET & BASE ─── */
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            transition: var(--transition-theme);
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--scroll-track); }
        ::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb);
            border-radius: 3px;
        }

        /* ─── CANVAS BACKGROUND ─── */
        #canvas-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ─── NEBULA BLOBS ─── */
        .nebula-wrap {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: var(--nebula-opacity);
            transition: opacity 0.5s ease;
        }

        .nebula-a {
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--accent-1), transparent 70%);
            top: -10%; left: -5%;
            animation: driftA 30s infinite ease-in-out;
        }

        .nebula-b {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--accent-2), transparent 70%);
            bottom: 5%; right: -5%;
            animation: driftB 35s infinite ease-in-out;
        }

        .nebula-c {
            width: 350px; height: 350px;
            background: radial-gradient(circle, var(--accent-3), transparent 70%);
            top: 40%; left: 50%;
            animation: driftC 28s infinite ease-in-out;
        }

        @keyframes driftA {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(60px,-40px) scale(1.1); }
            66%      { transform: translate(-30px,50px) scale(0.9); }
        }
        @keyframes driftB {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(-50px,30px) scale(1.05); }
            66%      { transform: translate(40px,-50px) scale(0.95); }
        }
        @keyframes driftC {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            50%      { transform: translate(-50%,-50%) scale(1.15); }
        }

        /* ─── CONTAINER ─── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px 60px;
            position: relative;
            z-index: 1;
        }

        /* ─── HEADER ─── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 28px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 50px;
            gap: 20px;
            flex-wrap: wrap;
            opacity: 0;
            transform: translateY(-20px);
            animation: slideDown 0.8s cubic-bezier(0.23,1,0.32,1) 0.1s forwards;
        }

        @keyframes slideDown {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── LOGO ─── */
        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: default;
        }

        .logo-mark {
            width: 44px; height: 44px;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: spinRing 8s linear infinite;
        }

        @keyframes spinRing {
            to { transform: rotate(360deg); }
        }

        .logo-mark i {
            font-size: 18px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            z-index: 1;
        }

        .logo-text {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 60%, var(--accent-3) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ─── HEADER RIGHT ─── */
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ─── THEME TOGGLE ─── */
        .theme-toggle {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .theme-toggle:hover {
            background: var(--bg-card-hover);
            color: var(--accent-1);
            border-color: var(--accent-1);
            transform: rotate(15deg) scale(1.1);
        }

        .theme-toggle:active {
            transform: rotate(15deg) scale(0.95);
        }

        .theme-toggle .icon-sun,
        .theme-toggle .icon-moon {
            position: absolute;
            transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }

        [data-theme="dark"]  .icon-sun  { opacity: 1; transform: rotate(0) scale(1); }
        [data-theme="dark"]  .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }
        [data-theme="light"] .icon-sun  { opacity: 0; transform: rotate(90deg) scale(0.5); }
        [data-theme="light"] .icon-moon { opacity: 1; transform: rotate(0) scale(1); }

        /* ─── SEARCH TYPE BUTTONS ─── */
        .search-types {
            display: flex;
            gap: 8px;
        }

        .search-type-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 9px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-weight: 500;
            font-size: 0.875rem;
            letter-spacing: 0.03em;
            display: flex; align-items: center; gap: 7px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .search-type-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .search-type-btn span, .search-type-btn i {
            position: relative; z-index: 1;
        }

        .search-type-btn:hover {
            color: var(--text-primary);
            border-color: var(--accent-1);
            transform: translateY(-2px);
        }

        .search-type-btn.active {
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 20px var(--glow-1);
        }

        .search-type-btn.active::before {
            opacity: 1;
        }

        /* ─── MAIN ─── */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── HERO ─── */
        .hero {
            text-align: center;
            margin-bottom: 48px;
            max-width: 700px;
            width: 100%;
        }

        .hero-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            line-height: 1.1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: riseUp 0.9s cubic-bezier(0.23,1,0.32,1) 0.3s forwards;
        }

        .hero-sub {
            font-size: 1.05rem;
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            animation: riseUp 0.9s cubic-bezier(0.23,1,0.32,1) 0.5s forwards;
        }

        @keyframes riseUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── SEARCH CONTAINER ─── */
        .search-container {
            width: 100%;
            max-width: 760px;
            opacity: 0;
            transform: translateY(20px);
            animation: riseUp 0.9s cubic-bezier(0.23,1,0.32,1) 0.65s forwards;
        }

        /* ─── SEARCH BOX ─── */
        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border-radius: 60px;
            border: 1px solid var(--border);
            padding: 6px 6px 6px 24px;
            backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.23,1,0.32,1);
            position: relative;
        }

        .search-box::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .search-box:focus-within {
            border-color: transparent;
            box-shadow: 0 8px 40px var(--glow-1), var(--card-shadow);
        }

        .search-box:focus-within::before {
            opacity: 1;
        }

        .search-icon-inner {
            color: var(--text-muted);
            font-size: 15px;
            margin-right: 12px;
            flex-shrink: 0;
            transition: color 0.3s ease;
        }

        .search-box:focus-within .search-icon-inner {
            color: var(--accent-1);
        }

        .search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Jost', sans-serif;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .search-input:focus { outline: none; }
        .search-input::placeholder { color: var(--text-muted); }

        .search-btn {
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            border: none;
            color: #fff;
            padding: 13px 26px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .search-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.15);
            transform: translateX(-100%);
            transition: transform 0.4s ease;
        }

        .search-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 24px var(--glow-1);
        }

        .search-btn:hover::after {
            transform: translateX(100%);
        }

        .search-btn:active {
            transform: scale(0.97);
        }

        /* ─── RIPPLE ─── */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: rippleOut 0.6s ease-out forwards;
            pointer-events: none;
        }

        @keyframes rippleOut {
            to { transform: scale(4); opacity: 0; }
        }

        /* ─── ERROR ─── */
        .error-message {
            background: rgba(255,75,139,0.1);
            border: 1px solid rgba(255,75,139,0.25);
            border-radius: 14px;
            padding: 14px 18px;
            margin-top: 16px;
            display: none;
            font-size: 0.9rem;
            color: #ff4b8b;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease;
        }

        .error-message.visible {
            display: flex;
        }

        /* ─── LOADING ─── */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 0;
            gap: 20px;
        }

        .loading.visible { display: flex; }

        .loader-orbit {
            position: relative;
            width: 64px; height: 64px;
        }

        .orbit-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .orbit-ring-1 {
            inset: 0;
            border-top-color: var(--accent-1);
            animation: spin 1s linear infinite;
        }

        .orbit-ring-2 {
            inset: 10px;
            border-top-color: var(--accent-2);
            animation: spin 0.7s linear infinite reverse;
        }

        .orbit-ring-3 {
            inset: 20px;
            border-top-color: var(--accent-3);
            animation: spin 1.4s linear infinite;
        }

        .orbit-dot {
            position: absolute;
            inset: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            animation: pulse2 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse2 {
            0%,100% { transform: scale(1); opacity: 1; }
            50%      { transform: scale(1.3); opacity: 0.7; }
        }

        .loading-text {
            font-family: 'Jost', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        /* ─── NO RESULTS ─── */
        .no-results {
            display: none;
            text-align: center;
            padding: 60px 0;
            color: var(--text-secondary);
        }

        .no-results.visible { display: block; }

        .no-results i {
            font-size: 2.5rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: block;
        }

        .no-results p { font-size: 1rem; }

        /* ─── RESULTS CONTAINER ─── */
        .results-container {
            width: 100%;
            display: none;
            margin-top: 40px;
        }

        .results-container.visible { display: block; }

        /* ─── RESULTS HEADER ─── */
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 12px;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.1s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .results-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .results-meta {
            display: flex;
            gap: 18px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .meta-item {
            display: flex; align-items: center; gap: 6px;
        }

        .meta-item i { color: var(--accent-1); }

        /* ─── RESULTS GRID ─── */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        /* ─── RESULT CARD ─── */
        .result-card {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 22px;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(24px) scale(0.97);
        }

        .result-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-3));
            opacity: 0;
            transition: opacity 0.35s ease;
            z-index: 0;
        }

        .result-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transition: left 0.6s ease;
        }

        .result-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(110,80,255,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3), 0 0 0 1px rgba(110,80,255,0.15);
        }

        .result-card:hover::before { opacity: 0.04; }

        .result-card:hover::after { left: 150%; }

        .result-card .card-content { position: relative; z-index: 1; }

        .result-card .card-domain {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 10px;
        }

        .domain-icon {
            width: 22px; height: 22px;
            border-radius: 6px;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            color: white;
            flex-shrink: 0;
        }

        .domain-url {
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .result-card h3 a {
            color: var(--accent-2);
            text-decoration: none;
            transition: color 0.2s ease;
            background-image: linear-gradient(var(--accent-1), var(--accent-1));
            background-size: 0 1px;
            background-repeat: no-repeat;
            background-position: 0 100%;
            transition: background-size 0.3s ease, color 0.2s ease;
        }

        .result-card h3 a:hover {
            color: var(--accent-1);
            background-size: 100% 1px;
        }

        .result-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            font-weight: 300;
        }

        /* ─── IMAGE GRID ─── */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* ─── IMAGE CARD ─── */
        .image-card {
            border-radius: 18px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.23,1,0.32,1);
            box-shadow: var(--card-shadow);
            opacity: 0;
            transform: translateY(24px) scale(0.97);
        }

        .image-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(110,80,255,0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        }

        .image-card .img-wrap {
            position: relative;
            overflow: hidden;
            height: 200px;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.23,1,0.32,1);
        }

        .image-card:hover img {
            transform: scale(1.07);
        }

        .img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .image-card:hover .img-overlay { opacity: 1; }

        .img-overlay-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0.5);
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            color: white;
            font-size: 16px;
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        .image-card:hover .img-overlay-icon {
            transform: translate(-50%,-50%) scale(1);
        }

        .image-card .image-info {
            padding: 14px 16px;
        }

        .image-card .image-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .image-card .image-source {
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        /* ─── PAGINATION ─── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 14px;
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            opacity: 0;
            animation: fadeIn 0.5s ease 0.5s forwards;
        }

        .page-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(10px);
        }

        .page-btn:hover:not(:disabled) {
            background: var(--bg-card-hover);
            color: var(--accent-1);
            border-color: var(--accent-1);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px var(--glow-1);
        }

        .page-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .page-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .page-indicator {
            font-family: 'Syncopate', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background-clip: padding-box;
        }

        /* ─── FOOTER ─── */
        footer {
            text-align: center;
            padding: 30px 0 20px;
            border-top: 1px solid var(--border);
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 300;
            opacity: 0;
            animation: fadeIn 1s ease 1.2s forwards;
        }

        .footer-brand {
            font-family: 'Syncopate', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .footer-note {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            opacity: 0.6;
        }

        /* ─── CARD ENTRY ANIMATION ─── */
        .card-enter {
            animation: cardEnter 0.55s cubic-bezier(0.23,1,0.32,1) forwards;
        }

        @keyframes cardEnter {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ─── CURSOR GLOW ─── */
        .cursor-glow {
            position: fixed;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%,-50%);
            transition: left 0.1s ease, top 0.1s ease;
            opacity: 0.5;
        }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            .container { padding: 0 16px 40px; }
            header { padding: 20px 0 18px; margin-bottom: 36px; }
            .logo-text { font-size: 1.1rem; }
            .search-types { width: 100%; justify-content: center; }
            .hero { margin-bottom: 36px; }
            .search-box { padding: 5px 5px 5px 18px; }
            .search-btn { padding: 12px 18px; font-size: 0.65rem; }
            .results-grid { grid-template-columns: 1fr; }
            .images-grid { grid-template-columns: 1fr; }
            .image-card .img-wrap { height: 180px; }
            .results-header { flex-direction: column; align-items: flex-start; }
        }

        @media (max-width: 480px) {
            .header-right { gap: 8px; }
            .search-type-btn { padding: 8px 12px; font-size: 0.8rem; }
            .hero-title { font-size: 1.7rem; }
        }

        /* ─── THEME TRANSITION OVERLAY ─── */
        .theme-flash {
            position: fixed;
            inset: 0;
            background: var(--bg-base);
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .theme-flash.flash {
            animation: themeFlash 0.5s ease forwards;
        }

        @keyframes themeFlash {
            0%   { opacity: 0.4; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- THEME TRANSITION FLASH -->
    <div class="theme-flash" id="theme-flash"></div>

    <!-- CURSOR GLOW -->
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- NEBULA BACKGROUND -->
    <div class="nebula-wrap">
        <div class="nebula nebula-a"></div>
        <div class="nebula nebula-b"></div>
        <div class="nebula nebula-c"></div>
    </div>

    <!-- STAR CANVAS -->
    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-mark">
                    <div class="logo-ring"></div>
                    <i class="fas fa-search"></i>
                </div>
                <div class="logo-text">ULTRA SEARCH</div>
            </div>
            <div class="header-right">
                <div class="search-types">
                    <button class="search-type-btn active" data-type="web">
                        <i class="fas fa-globe"></i>
                        <span>Веб</span>
                    </button>
                    <button class="search-type-btn" data-type="images">
                        <i class="fas fa-image"></i>
                        <span>Фото</span>
                    </button>
                </div>
                <button class="theme-toggle" id="theme-toggle" title="Переключить тему">
                    <i class="fas fa-sun icon-sun"></i>
                    <i class="fas fa-moon icon-moon"></i>
                </button>
            </div>
        </header>

        <main>
            <div class="hero">
                <h1 class="hero-title">ULTRA SEARCH</h1>
                <p class="hero-sub">Исследуйте цифровую вселенную. Быстро, чисто, без лишнего.</p>
            </div>

            <div class="search-container">
                <div class="search-box" id="search-box">
                    <i class="fas fa-search search-icon-inner"></i>
                    <input
                        type="text"
                        class="search-input"
                        id="search-input"
                        placeholder="Введите запрос..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button class="search-btn" id="search-button">
                        <i class="fas fa-arrow-right"></i>
                        <span>ПОИСК</span>
                    </button>
                </div>

                <div class="error-message" id="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>

                <div class="loading" id="loading">
                    <div class="loader-orbit">
                        <div class="orbit-ring orbit-ring-1"></div>
                        <div class="orbit-ring orbit-ring-2"></div>
                        <div class="orbit-ring orbit-ring-3"></div>
                        <div class="orbit-dot"></div>
                    </div>
                    <span class="loading-text">Поиск...</span>
                </div>

                <div class="no-results" id="no-results">
                    <i class="fas fa-satellite-dish"></i>
                    <p>По запросу ничего не найдено</p>
                </div>

                <div class="results-container" id="results-container">
                    <div class="results-header">
                        <div class="results-title">РЕЗУЛЬТАТЫ</div>
                        <div class="results-meta">
                            <div class="meta-item">
                                <i class="fas fa-layer-group"></i>
                                <span id="results-count-text">0</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-bolt"></i>
                                <span id="search-time-text">0 с</span>
                            </div>
                        </div>
                    </div>

                    <div id="results-content"></div>

                    <div class="pagination" id="pagination">
                        <button class="page-btn" id="prev-page" disabled>
                            <i class="fas fa-chevron-left"></i> Назад
                        </button>
                        <div class="page-indicator">
                            <span id="current-page">1</span>
                        </div>
                        <button class="page-btn" id="next-page" disabled>
                            Вперед <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-brand">ULTRA CORPORATION</div>
            <p>Ultra Search · цифровая вселенная</p>
            <p class="footer-note">Запросы и посещения сохраняются в логах</p>
        </footer>
    </div>

    <script>
    // ─── THEME ───────────────────────────────────────────────
    (function () {
        const stored  = localStorage.getItem('us-theme');
        const system  = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        const initial = stored || system;
        document.documentElement.setAttribute('data-theme', initial);
    })();

    document.addEventListener('DOMContentLoaded', () => {

        const html       = document.documentElement;
        const toggleBtn  = document.getElementById('theme-toggle');
        const flashEl    = document.getElementById('theme-flash');

        toggleBtn.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            flashEl.classList.add('flash');
            flashEl.addEventListener('animationend', () => flashEl.classList.remove('flash'), { once: true });
            html.setAttribute('data-theme', next);
            localStorage.setItem('us-theme', next);
            rebuildStars();
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('us-theme')) {
                html.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                rebuildStars();
            }
        });

        // ─── CURSOR GLOW ─────────────────────────────────────
        const cursorGlow = document.getElementById('cursor-glow');
        let cx = -500, cy = -500;

        document.addEventListener('mousemove', e => {
            cx = e.clientX; cy = e.clientY;
            cursorGlow.style.left = cx + 'px';
            cursorGlow.style.top  = cy + 'px';
        });

        // ─── STAR CANVAS ─────────────────────────────────────
        const canvas = document.getElementById('canvas-bg');
        const ctx    = canvas.getContext('2d');
        let stars    = [];
        let W, H;

        function resizeCanvas() {
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function makeStars() {
            stars = [];
            const n = Math.min(Math.floor((W * H) / 6000), 220);
            for (let i = 0; i < n; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: Math.random() * 1.4 + 0.3,
                    base: Math.random() * 0.6 + 0.2,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.015 + 0.005,
                    drift: (Math.random() - 0.5) * 0.15,
                    vy: Math.random() * 0.01 + 0.005,
                });
            }
        }

        function rebuildStars() {
            resizeCanvas();
            makeStars();
        }

        function getStarColor() {
            return html.getAttribute('data-theme') === 'dark'
                ? 'rgba(255,255,255,'
                : 'rgba(100,80,220,';
        }

        let animFrame;
        let t = 0;
        function drawStars() {
            ctx.clearRect(0, 0, W, H);
            t += 0.01;
            const col = getStarColor();

            // Mouse parallax
            const mx = (cx / W - 0.5) * 30;
            const my = (cy / H - 0.5) * 30;

            for (const s of stars) {
                s.phase += s.speed;
                // Slow drift
                s.y -= s.vy;
                s.x += s.drift * 0.05;
                if (s.y < -5) { s.y = H + 5; s.x = Math.random() * W; }
                if (s.x < -5) s.x = W + 5;
                if (s.x > W + 5) s.x = -5;

                const twinkle = s.base + Math.sin(s.phase) * 0.3;
                const px = s.x + mx * (s.r / 1.7) * 0.08;
                const py = s.y + my * (s.r / 1.7) * 0.08;

                ctx.beginPath();
                ctx.arc(px, py, s.r, 0, Math.PI * 2);
                ctx.fillStyle = col + twinkle.toFixed(2) + ')';
                ctx.fill();

                // Occasional bright star with glow
                if (s.r > 1.3) {
                    ctx.beginPath();
                    ctx.arc(px, py, s.r * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = col + (twinkle * 0.15).toFixed(2) + ')';
                    ctx.fill();
                }
            }

            animFrame = requestAnimationFrame(drawStars);
        }

        resizeCanvas();
        makeStars();
        drawStars();
        window.addEventListener('resize', () => { resizeCanvas(); makeStars(); });

        // ─── SEARCH TYPE ─────────────────────────────────────
        const typeButtons = document.querySelectorAll('.search-type-btn');
        let currentType   = 'web';

        typeButtons.forEach(btn => {
            btn.addEventListener('click', function () {
                typeButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentType = this.getAttribute('data-type');
                if (currentQuery) performSearch(currentQuery, 1);
            });
        });

        // ─── SEARCH LOGIC ────────────────────────────────────
        const searchInput  = document.getElementById('search-input');
        const searchBtn    = document.getElementById('search-button');
        const resultsWrap  = document.getElementById('results-container');
        const resultsContent = document.getElementById('results-content');
        const loadingEl    = document.getElementById('loading');
        const noResultsEl  = document.getElementById('no-results');
        const errorEl      = document.getElementById('error-message');
        const errorText    = document.getElementById('error-text');
        const countText    = document.getElementById('results-count-text');
        const timeText     = document.getElementById('search-time-text');
        const prevBtn      = document.getElementById('prev-page');
        const nextBtn      = document.getElementById('next-page');
        const currentPageEl = document.getElementById('current-page');

        let currentQuery = '';
        let currentPage  = 1;
        let hasNextPage  = false;

        searchBtn.addEventListener('click', e => {
            addRipple(e, searchBtn);
            doSearch();
        });

        searchInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) performSearch(currentQuery, currentPage - 1);
        });

        nextBtn.addEventListener('click', () => {
            if (hasNextPage) performSearch(currentQuery, currentPage + 1);
        });

        function doSearch() {
            const q = searchInput.value.trim();
            if (!q) { showError('Введите поисковый запрос'); return; }
            performSearch(q, 1);
        }

        async function performSearch(query, page) {
            currentQuery = query;
            currentPage  = page;

            // Hide everything
            hideAll();
            loadingEl.classList.add('visible');

            const endpoint = currentType === 'images'
                ? `/api/search/images?query=${encodeURIComponent(query)}&page=${page}`
                : `/api/search?query=${encodeURIComponent(query)}&page=${page}`;

            try {
                const res  = await fetch(endpoint);
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Ошибка поиска');
                renderResults(data);
            } catch (err) {
                loadingEl.classList.remove('visible');
                if (err.message.includes('quota') || err.message.includes('Daily'))
                    showError('Достигнут дневной лимит. Попробуйте завтра.');
                else
                    showError('Ошибка: ' + err.message);
            }
        }

        function renderResults(data) {
            loadingEl.classList.remove('visible');

            const total      = parseInt(data.totalResults) || 0;
            const searchTime = parseFloat(data.searchTime) || 0;
            hasNextPage      = data.hasNextPage || false;

            countText.textContent  = total.toLocaleString('ru-RU');
            timeText.textContent   = searchTime + ' с';
            currentPageEl.textContent = currentPage;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = !hasNextPage;

            if (!data.results || !data.results.length) {
                noResultsEl.classList.add('visible');
                return;
            }

            resultsContent.innerHTML = '';

            if (currentType === 'images') {
                const grid = document.createElement('div');
                grid.className = 'images-grid';
                data.results.forEach((r, i) => {
                    const card = buildImageCard(r, data.query);
                    grid.appendChild(card);
                    setTimeout(() => card.classList.add('card-enter'), i * 70);
                });
                resultsContent.appendChild(grid);
            } else {
                const grid = document.createElement('div');
                grid.className = 'results-grid';
                data.results.forEach((r, i) => {
                    const card = buildResultCard(r, data.query);
                    grid.appendChild(card);
                    setTimeout(() => card.classList.add('card-enter'), i * 60);
                });
                resultsContent.appendChild(grid);
            }

            resultsWrap.classList.add('visible');
            setTimeout(() => resultsWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 200);
        }

        function buildResultCard(r, query) {
            const card = document.createElement('div');
            card.className = 'result-card';
            const domain = r.displayLink || tryDomain(r.link);
            card.innerHTML = `
                <div class="card-content">
                    <div class="card-domain">
                        <div class="domain-icon"><i class="fas fa-globe"></i></div>
                        <span class="domain-url">${domain}</span>
                    </div>
                    <h3><a href="${r.link}" target="_blank" rel="noopener noreferrer">${r.title || 'Без названия'}</a></h3>
                    <p>${r.snippet || ''}</p>
                </div>`;
            const a = card.querySelector('a');
            a.addEventListener('click', () => logVisit(query, r.link, r.title, 'веб-сайт'));
            return card;
        }

        function buildImageCard(r, query) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.innerHTML = `
                <div class="img-wrap">
                    <img src="${r.image?.thumbnailLink || r.link}"
                         alt="${r.title || ''}"
                         loading="lazy"
                         onerror="this.src='https://via.placeholder.com/400x220/0e0e1c/6e50ff?text=+'">
                    <div class="img-overlay">
                        <div class="img-overlay-icon"><i class="fas fa-external-link-alt"></i></div>
                    </div>
                </div>
                <div class="image-info">
                    <div class="image-title">${r.title || 'Изображение'}</div>
                    <div class="image-source">${r.displayLink || ''}</div>
                </div>`;
            card.addEventListener('click', () => {
                logVisit(query, r.link, r.title, 'изображение');
                window.open(r.link, '_blank');
            });
            return card;
        }

        function tryDomain(url) {
            try { return new URL(url).hostname; } catch { return url; }
        }

        async function logVisit(query, url, title, type) {
            try {
                await fetch('/api/log/visit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query || 'Прямой', url, title: title || '', type: type || 'web' })
                });
            } catch {}
        }

        function showError(msg) {
            errorText.textContent = msg;
            errorEl.classList.add('visible');
        }

        function hideAll() {
            loadingEl.classList.remove('visible');
            resultsWrap.classList.remove('visible');
            noResultsEl.classList.remove('visible');
            errorEl.classList.remove('visible');
        }

        // ─── RIPPLE ──────────────────────────────────────────
        function addRipple(e, el) {
            const rect    = el.getBoundingClientRect();
            const size    = Math.max(rect.width, rect.height);
            const x       = e.clientX - rect.left - size / 2;
            const y       = e.clientY - rect.top  - size / 2;
            const rip     = document.createElement('span');
            rip.className = 'ripple';
            rip.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
            el.appendChild(rip);
            rip.addEventListener('animationend', () => rip.remove());
        }

        // ─── SEARCH BOX MAGNETIC ─────────────────────────────
        const box = document.getElementById('search-box');
        box.addEventListener('mousemove', e => {
            const r  = box.getBoundingClientRect();
            const dx = (e.clientX - r.left - r.width  / 2) / r.width  * 6;
            const dy = (e.clientY - r.top  - r.height / 2) / r.height * 3;
            box.style.transform = `translate(${dx}px, ${dy}px)`;
        });
        box.addEventListener('mouseleave', () => {
            box.style.transform = '';
            box.style.transition = 'transform 0.5s cubic-bezier(0.23,1,0.32,1)';
        });

        // ─── RANDOM PLACEHOLDER ──────────────────────────────
        const hints = ['космос', 'AI технологии', 'квантовые компьютеры', 'звёзды', 'архитектура', 'фотография'];
        searchInput.placeholder = 'Попробуйте: ' + hints[Math.floor(Math.random() * hints.length)];

    }); // end DOMContentLoaded
    </script>
</body>
</html>
